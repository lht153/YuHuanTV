<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=player.html">
    <link rel="icon" href="image/YuHuanTVLogonew.png">
    <title>正在跳转到播放器...</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/watch.css">
    <style>
        :root {
            --ios-bg-0: #090b10;
            --ios-bg-1: #11151f;
            --ios-bg-2: #171c28;
            --ios-card: rgba(20, 24, 34, 0.68);
            --ios-border: rgba(255, 255, 255, 0.08);
            --ios-border-strong: rgba(255, 255, 255, 0.16);
            --ios-text: #f2f5ff;
            --ios-text-muted: #a5adc2;
            --ios-accent: #0a84ff;
            --ios-shadow: 0 14px 32px rgba(0, 0, 0, 0.45);
        }

        body {
            background:
              radial-gradient(circle at 20% 0%, #1b2334 0%, transparent 45%),
              radial-gradient(circle at 85% 10%, #162038 0%, transparent 40%),
              linear-gradient(180deg, var(--ios-bg-0), var(--ios-bg-1) 45%, var(--ios-bg-2)) !important;
            color: var(--ios-text) !important;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .redirect-container {
            background: var(--ios-card) !important;
            border: 1px solid var(--ios-border) !important;
            border-radius: 22px !important;
            box-shadow: var(--ios-shadow) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
        }

        .redirect-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
        }

        .loading-animation {
            border-color: rgba(255, 255, 255, 0.2) !important;
            border-top-color: #6eb9ff !important;
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.12);
        }

        .redirect-message {
            color: var(--ios-text) !important;
            font-weight: 600 !important;
            letter-spacing: 0.01em;
        }

        #redirect-status,
        .redirect-hint {
            color: var(--ios-text-muted) !important;
        }

        .redirect-hint a {
            color: #dff1ff !important;
            background: linear-gradient(180deg, #2b7dff, #0a5ee0) !important;
            border: 1px solid var(--ios-border) !important;
            border-radius: 999px !important;
            padding: 0.35rem 0.75rem !important;
            text-decoration: none !important;
            font-weight: 600 !important;
            transition: all 0.2s ease !important;
        }

        .redirect-hint a:hover {
            filter: brightness(1.06);
        }

        .redirect-hint a:active {
            transform: scale(0.98);
        }

        a:focus-visible {
            outline: 2px solid rgba(90, 200, 250, 0.65);
            outline-offset: 2px;
            border-radius: 999px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
    <script src="js/watch.js"></script>
</head>
<body>
    <div class="redirect-container">
        <div class="loading-animation"></div>
        <div class="redirect-message">正在加载播放器...</div>
        <div id="redirect-status">准备视频数据中，请稍候...</div>
        <p class="redirect-hint">如果页面没有自动跳转，请<a href="player.html" id="manual-redirect">点击这里</a></p>
    </div>
</body>
</html>
